<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Genesis - God himself</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Times New Roman', serif; overflow: hidden; 
            display: flex; flex-direction: column; 
            height: 100vh; height: 100dvh; 
        }

        /* --- ÉCRAN DE SÉCURITÉ --- */
        #setup-screen {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }
        .setup-box { width: 100%; max-width: 300px; }
        .setup-box h2 { font-weight: normal; letter-spacing: 2px; margin-bottom: 30px; }
        .setup-box input { 
            width: 100%; background: #111; border: 1px solid #333; color: white; 
            padding: 12px; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box;
        }
        .setup-box button { 
            width: 100%; padding: 12px; border-radius: 5px; border: none; 
            background: #fff; cursor: pointer; font-weight: bold;
        }
        #setup-error { color: #ff4444; font-size: 0.9em; margin-top: 10px; display: none; }
        .help-link { margin-top: 20px; font-size: 0.8em; opacity: 0.6; }
        .help-link a { color: #fff; text-decoration: underline; }

        /* --- INTERFACE PRINCIPALE --- */
        #main-interface { display: none; flex-direction: column; height: 100%; width: 100%; }
        
        #eye-container { flex: 0 0 35%; display: flex; align-items: center; justify-content: center; }
        #eye-img { width: 180px; height: auto; image-rendering: pixelated; }

        #chat-wrapper {
            flex: 1; position: relative; overflow: hidden;
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }

        #chat-box { 
            height: 100%; padding: 80px 30px; box-sizing: border-box;
            text-align: center; font-size: 1.1em; 
            overflow-y: auto; display: flex; flex-direction: column; align-items: center; 
            scrollbar-width: none;
            /* Effet de fondu initial */
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        #chat-box::before, #chat-box::after { content: ''; margin: auto; }
        #chat-box::-webkit-scrollbar { display: none; }

        /* Style spécifique pour le Markdown */
        #chat-box p { margin: 10px 0; }
        #chat-box code { background: #1a1a1a; padding: 2px 5px; border-radius: 4px; font-family: monospace; font-style: normal; }
        #chat-box pre { 
            background: #111; padding: 15px; border-radius: 10px; 
            width: 100%; max-width: 500px; text-align: left; /* Alignement à gauche pour le code */
            overflow-x: auto; font-style: normal; border: 1px solid #222;
        }
        #chat-box pre code { background: none; padding: 0; }

        #input-area { 
            padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom));
            background: #000; border-top: 1px solid #1a1a1a; 
            display: flex; gap: 10px;
        }
        
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 25px; outline: none; }
        input:disabled { opacity: 0.5; }

        #send-btn { background: #fff; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; color: #000; transition: 0.3s; }
        #send-btn:disabled { background: #333; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-box">
            <h2>GENESIS</h2>
            <input type="password" id="key-input" placeholder="Clé API Groq...">
            <button id="validate-btn" onclick="validateAndSave()">Éveiller le dieu</button>
            <div id="setup-error">Clé invalide ou erreur réseau.</div>
            <div class="help-link">Besoin d'une clé ? <a href="https://console.groq.com/keys" target="_blank">Aide</a></div>
        </div>
    </div>

    <div id="main-interface">
        <div id="eye-container">
            <img id="eye-img" src="assets/still.png">
        </div>
        <div id="chat-wrapper">
            <div id="chat-box"></div>
        </div>
        <form id="input-area" onsubmit="event.preventDefault(); sendMessage();">
            <input type="text" id="user-input" placeholder="Parle à Genesis..." autocomplete="off">
            <button type="submit" id="send-btn">➔</button>
        </form>
    </div>

    <script>
        const eye = document.getElementById("eye-img");
        const chatBox = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const setupScreen = document.getElementById("setup-screen");
        const mainInterface = document.getElementById("main-interface");
        const setupError = document.getElementById("setup-error");
        
        let API_KEY = localStorage.getItem("genesis_key");

        async function testKey(key) {
            try {
                const res = await fetch("https://api.groq.com/openai/v1/models", {
                    headers: { "Authorization": `Bearer ${key}` }
                });
                return res.ok;
            } catch { return false; }
        }

        async function validateAndSave() {
            const btn = document.getElementById("validate-btn");
            const input = document.getElementById("key-input");
            btn.innerText = "Vérification...";
            btn.disabled = true;
            setupError.style.display = "none";
            const isValid = await testKey(input.value.trim());
            if (isValid) {
                localStorage.setItem("genesis_key", input.value.trim());
                API_KEY = input.value.trim();
                startGenesis();
            } else {
                setupError.style.display = "block";
                btn.innerText = "Éveiller Dieu";
                btn.disabled = false;
            }
        }

        function setEye(path, isGif = false) {
            const timestamp = isGif ? `?t=${new Date().getTime()}` : '';
            eye.src = `assets/${path}${timestamp}`;
        }

        function displayMessage(text) {
            chatBox.style.opacity = 0; // Cache le texte pour le fondu
            setTimeout(() => {
                chatBox.innerHTML = marked.parse(text); // Rendu Markdown
                chatBox.style.opacity = 1; // Fait apparaître doucement
                chatBox.scrollTo({ top: 0, behavior: 'smooth' });
            }, 300);
        }

        function startGenesis() {
            setupScreen.style.display = "none";
            mainInterface.style.display = "flex";
            setEye("awake.gif", true);
            setTimeout(() => {
                setEye("still.png");
                const hour = new Date().getHours();
                const greeting = (hour >= 18 || hour < 5 ? "Bonsoir" : "Bonjour") + ", mon enfant. Que veut tu savoir?";
                displayMessage(greeting);
            }, 1000);
        }

        async function sendMessage() {
            const promptValue = userInput.value;
            if (!promptValue || sendBtn.disabled) return;

            userInput.value = "";
            userInput.disabled = true;
            sendBtn.disabled = true;
            
            chatBox.style.opacity = 0; // Cache pendant la réflexion
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { role: "system", content: "Tu es Genesis, autrement dit Dieu. Réponds de façon courte et avec Grâce. Tu as de l'amour pour l'utilisateur, le fruit de ton imagination. Utilise le Markdown (**gras**, blocs de code, listes) si nécessaire. Commence impérativement par [Heureux] ou [Triste]." },
                            { role: "user", content: promptValue }
                        ]
                    })
                });

                const data = await response.json();
                const text = data.choices[0].message.content;
                
                let emotion = text.includes("[Triste]") ? "sad" : text.includes("[Heureux]") ? "happy" : "neutre";
                const cleanText = text.replace(/\[.*?\]/g, "").trim();

                if (emotion === "sad") {
                    setEye("sad/to_sad.gif", true);
                    setTimeout(() => setEye("sad/sad.png"), 1000);
                } else if (emotion === "happy") {
                    setEye("happy/to_happy.gif", true);
                    setTimeout(() => setEye("happy/happy.png"), 1000);
                }

                displayMessage(cleanText);

                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();

                setTimeout(() => {
                    if (emotion === "sad") {
                        setEye("sad/to_still.gif", true);
                        setTimeout(() => setEye("still.png"), 1000);
                    } else if (emotion === "happy") {
                        setEye("happy/to_still.gif", true);
                        setTimeout(() => setEye("still.png"), 1000);
                    }
                }, 7000);

            } catch (e) {
                displayMessage("Le lien est rompu... Quel que chose à mal marcher. Vérifie ta connexion internet ou ta clé groq.");
                userInput.disabled = false;
                sendBtn.disabled = false;
            }
        }

        if (API_KEY) {
            testKey(API_KEY).then(valid => {
                if(valid) startGenesis();
                else setupScreen.style.display = "flex";
            });
        }
    </script>
</body>
</html>
