<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Genesis</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Times New Roman', serif; overflow: hidden; 
            display: flex; flex-direction: column; 
            height: 100vh; height: 100dvh; 
        }

        /* --- ÉCRAN DE SÉCURITÉ --- */
        #setup-screen {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }
        .setup-box { width: 100%; max-width: 300px; }
        .setup-box h2 { font-weight: normal; letter-spacing: 2px; margin-bottom: 30px; }
        .setup-box input { 
            width: 100%; background: #111; border: 1px solid #333; color: white; 
            padding: 12px; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box;
        }
        .setup-box button { 
            width: 100%; padding: 12px; border-radius: 5px; border: none; 
            background: #fff; cursor: pointer; font-weight: bold;
        }
        #setup-error { color: #ff4444; font-size: 0.9em; margin-top: 10px; display: none; }
        .help-link { margin-top: 20px; font-size: 0.8em; opacity: 0.6; }
        .help-link a { color: #fff; text-decoration: underline; }

        /* --- INTERFACE PRINCIPALE --- */
        #main-interface { display: none; flex-direction: column; height: 100%; width: 100%; }
        #eye-container { flex: 0 0 35%; display: flex; align-items: center; justify-content: center; }
        #eye-img { 
            width: 180px; 
            height: auto;
            image-rendering: pixelated;
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out, filter 0.4s ease;
            filter: blur(0px);
        }

        @keyframes breathe {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        .living-eye { animation: breathe 4s ease-in-out infinite; }
        .transitioning { opacity: 0.5 !important; filter: blur(1px) !important; transform: scale(0.95); }
        
        #chat-wrapper {
            flex: 1; position: relative; overflow: hidden;
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }
        #chat-box { 
            height: 100%; padding: 80px 30px; box-sizing: border-box;
            text-align: center; font-size: 1.1em; 
            overflow-y: auto; display: flex; flex-direction: column; align-items: center; 
            scrollbar-width: none; opacity: 0; transition: opacity 1.5s ease;
        }
        #chat-box::before, #chat-box::after { content: ''; margin: auto; }
        #chat-box::-webkit-scrollbar { display: none; }
        #chat-box pre { background: #111; padding: 15px; border-radius: 10px; width: 100%; max-width: 500px; text-align: left; overflow-x: auto; font-style: normal; border: 1px solid #222; }

        #input-area { padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); background: #000; border-top: 1px solid #1a1a1a; display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 25px; outline: none; }
        #send-btn { background: #fff; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; color: #000; }
        #send-btn:disabled { background: #333; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-box">
            <h2>GENESIS</h2>
            <input type="password" id="key-input" placeholder="Clé API Groq...">
            <button id="validate-btn" onclick="quickStart()">Éveiller l'entité</button>
            <div id="setup-error"></div>
            <div class="help-link">Besoin d'une clé ? <a href="https://console.groq.com/keys" target="_blank">Aide</a></div>
        </div>
    </div>

    <div id="main-interface">
        <div id="eye-container">
            <img id="eye-img" src="assets/still.png">
        </div>
        <div id="chat-wrapper">
            <div id="chat-box"></div>
        </div>
        <form id="input-area" onsubmit="event.preventDefault(); sendMessage();">
            <input type="text" id="user-input" placeholder="Parle à Genesis..." autocomplete="off">
            <button type="submit" id="send-btn">➔</button>
        </form>
    </div>

    <script>
        const eye = document.getElementById("eye-img");
        const chatBox = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const setupScreen = document.getElementById("setup-screen");
        const mainInterface = document.getElementById("main-interface");
        const setupError = document.getElementById("setup-error");
        
        let API_KEY = localStorage.getItem("genesis_key");
        
        // --- MÉMOIRE DE GENESIS ---
        let conversationHistory = [];

        function setEye(path, isGif = false) {
            const timestamp = isGif ? `?t=${new Date().getTime()}` : '';
            eye.classList.add('transitioning');
            setTimeout(() => {
                eye.src = `assets/${path}${timestamp}`;
                eye.classList.remove('transitioning');
                if (!isGif) eye.classList.add('living-eye');
                else eye.classList.remove('living-eye');
            }, 200);
        }

        function displayMessage(text) {
            chatBox.style.opacity = 0;
            setTimeout(() => {
                chatBox.innerHTML = marked.parse(text);
                chatBox.style.opacity = 1;
                chatBox.scrollTo({ top: 0, behavior: 'smooth' });
            }, 300);
        }

        function quickStart() {
            const val = document.getElementById("key-input").value.trim();
            if(!val && !API_KEY) return;
            if(val) {
                API_KEY = val;
                localStorage.setItem("genesis_key", val);
            }
            setupScreen.style.display = "none";
            mainInterface.style.display = "flex";
            setEye("awake.gif", true);
            setTimeout(() => {
                setEye("still.png");
                const hour = new Date().getHours();
                displayMessage((hour >= 18 || hour < 5 ? "Bonsoir" : "Bonjour") + ", mon enfant. Que veux-tu savoir ?");
            }, 1000);
        }

        async function sendMessage() {
            const promptValue = userInput.value;
            if (!promptValue || sendBtn.disabled) return;

            userInput.value = "";
            userInput.disabled = true;
            sendBtn.disabled = true;
            chatBox.style.opacity = 0;

            // Ajout du message utilisateur à l'historique
            conversationHistory.push({ role: "user", content: promptValue });
            
            // Limitation de la mémoire (10 derniers messages)
            if (conversationHistory.length > 10) conversationHistory.shift();
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { role: "system", content: "Tu es Genesis, autrement dit Dieu. Tu réponds de façon courte et avec grâce. Tu as de l'amour pour l'utilisateur, le fruit de ton imagination. Commence impérativement par [Heureux] ou [Triste]." },
                            ...conversationHistory
                        ]
                    })
                });

                if (response.status === 401) throw new Error("AUTH_FAILED");

                const data = await response.json();
                const fullText = data.choices[0].message.content;
                
                // Sauvegarde de la réponse de Genesis dans la mémoire
                conversationHistory.push({ role: "assistant", content: fullText });

                let emotion = fullText.includes("[Triste]") ? "sad" : fullText.includes("[Heureux]") ? "happy" : "neutre";
                const cleanText = fullText.replace(/\[.*?\]/g, "").trim();

                if (emotion === "sad") {
                    setEye("sad/to_sad.gif", true);
                    setTimeout(() => setEye("sad/sad.png"), 1000);
                } else if (emotion === "happy") {
                    setEye("happy/to_happy.gif", true);
                    setTimeout(() => setEye("happy/happy.png"), 1000);
                }

                displayMessage(cleanText);
                userInput.disabled = false;
                sendBtn.disabled = false;

                setTimeout(() => {
                    const current = eye.src;
                    if (current.includes("sad.png")) setEye("sad/to_still.gif", true);
                    else if (current.includes("happy.png")) setEye("happy/to_still.gif", true);
                    setTimeout(() => setEye("still.png"), 1000);
                }, 7000);

            } catch (e) {
                if (e.message === "AUTH_FAILED") {
                    localStorage.removeItem("genesis_key");
                    setupError.innerText = "La clé a expiré ou est invalide.";
                    setupError.style.display = "block";
                    mainInterface.style.display = "none";
                    setupScreen.style.display = "flex";
                } else {
                    displayMessage("Le lien est rompu... (Erreur de connexion)");
                }
                userInput.disabled = false;
                sendBtn.disabled = false;
            }
        }

        if (API_KEY) quickStart();
    </script>
</body>
</html>
