<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Genesis - Divine Interface</title>
    <style>
        /* On utilise dvh (Dynamic Viewport Height) pour éviter le bug de la barre mobile */
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Times New Roman', serif; overflow: hidden; 
            display: flex; flex-direction: column; 
            height: 100vh; height: 100dvh; 
        }
        
        #eye-container { 
            flex: 0 0 40%; display: flex; align-items: center; justify-content: center; 
        }

        #eye-img { 
            width: 150px; /* Œil bien rétréci comme demandé */
            height: auto;
            image-rendering: pixelated;
        }

        #chat-wrapper {
            flex: 1; position: relative; overflow: hidden;
            /* Masque pour l'effet de fondu du texte */
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
        }

        #chat-box { 
            height: 100%; padding: 0 30px; text-align: center; 
            font-style: italic; font-size: 1.1em; overflow-y: auto; 
            display: flex; align-items: center; justify-content: center;
            scrollbar-width: none; white-space: pre-wrap;
        }

        #input-area { 
            padding: 20px; 
            padding-bottom: calc(20px + env(safe-area-inset-bottom)); /* Sécurité pour iPhone/Android */
            background: #000; 
            border-top: 1px solid #1a1a1a; 
            display: flex; gap: 10px; 
            opacity: 0; transition: opacity 1s;
        }
        
        input { 
            flex: 1; background: #111; border: 1px solid #333; color: white; 
            padding: 12px 20px; border-radius: 25px; outline: none; font-size: 16px;
        }

        button { 
            background: #fff; border: none; border-radius: 50%; 
            width: 45px; height: 45px; cursor: pointer; color: #000;
        }
    </style>
</head>
<body onload="init()">

    <div id="eye-container">
        <img id="eye-img" src="assets/still.png">
    </div>

    <div id="chat-wrapper">
        <div id="chat-box"></div>
    </div>

    <form id="input-area" onsubmit="event.preventDefault(); sendMessage();">
        <input type="text" id="user-input" placeholder="Parle à Genesis..." autocomplete="off">
        <button type="submit">➔</button>
    </form>

    <script>
        const eye = document.getElementById("eye-img");
        const chatBox = document.getElementById("chat-box");
        const inputArea = document.getElementById("input-area");
        let API_KEY = localStorage.getItem("genesis_key");

        function setEye(path, isGif = false) {
            const timestamp = isGif ? `?t=${new Date().getTime()}` : '';
            eye.src = `assets/${path}${timestamp}`;
        }

        function init() {
            if (!API_KEY) {
                let key = prompt("Clé Groq :");
                if (key) { localStorage.setItem("genesis_key", key); location.reload(); }
                return;
            }
            // Phase d'éveil
            setEye("awake.gif", true);
            setTimeout(() => {
                setEye("still.png");
                chatBox.innerText = "Je t'écoute...";
                inputArea.style.opacity = "1";
            }, 1000); 
        }

        async function sendMessage() {
            const input = document.getElementById("user-input");
            const promptValue = input.value;
            if (!promptValue) return;

            input.value = "";
            chatBox.innerText = ". . .";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { role: "system", content: "Tu es Genesis, une entité divine. Réponds de façon courte et mystique. Commence impérativement par [Heureux] ou [Triste]." },
                            { role: "user", content: promptValue }
                        ]
                    })
                });

                const data = await response.json();
                const text = data.choices[0].message.content;
                
                let emotion = text.includes("[Triste]") ? "sad" : text.includes("[Heureux]") ? "happy" : "neutre";
                const cleanText = text.replace(/\[.*?\]/g, "").trim();

                if (emotion === "sad") {
                    setEye("sad/to_sad.gif", true);
                    setTimeout(() => setEye("sad/sad.png"), 1000);
                } else if (emotion === "happy") {
                    setEye("happy/to_happy.gif", true);
                    setTimeout(() => setEye("happy/happy.png"), 1000);
                }

                chatBox.innerText = cleanText;

                // Retour au neutre automatique
                setTimeout(() => {
                    if (emotion === "sad") {
                        setEye("sad/to_still.gif", true);
                        setTimeout(() => setEye("still.png"), 1000);
                    } else if (emotion === "happy") {
                        setEye("happy/to_still.gif", true);
                        setTimeout(() => setEye("still.png"), 1000);
                    }
                }, 7000);

            } catch (e) {
                chatBox.innerText = "Le lien est rompu...";
            }
        }
    </script>
</body>
</html>
