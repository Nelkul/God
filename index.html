<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis Mobile</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Times New Roman', serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* CENTRE DU CHARGEMENT */
        #loader-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; text-align: center; z-index: 10;
        }
        #progress-bar-bg { width: 100%; height: 4px; background: #222; margin-top: 15px; border-radius: 2px; }
        #progress-bar-fill { width: 0%; height: 100%; background: #fff; box-shadow: 0 0 10px #fff; transition: width 0.3s; }

        /* L'OEIL */
        #eye-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #eye-img, #sad-img { position: absolute; width: 180px; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        #eye-img { transform: scaleY(0); } 
        #sad-img { opacity: 0; transition: opacity 0.5s; width: 190px; }

        /* ZONE DE TEXTE */
        #chat-box { height: 100px; padding: 15px; text-align: center; font-style: italic; font-size: 1.1em; background: transparent; }
        
        /* L'INPUT */
        #input-container { padding: 20px; display: flex; gap: 10px; background: #000; opacity: 0; transition: opacity 1s; }
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 25px; outline: none; }
        button { background: none; border: 1px solid #555; color: white; border-radius: 50%; width: 45px; height: 45px; }

        #status-text { font-size: 1em; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="loader-container">
        <div id="status-text">Éveil de Genesis...</div>
        <div id="progress-bar-bg">
            <div id="progress-bar-fill"></div>
        </div>
        <div id="percentage-text" style="margin-top: 10px; font-size: 0.8em; color: #888;">0%</div>
    </div>

    <div id="eye-container">
        <img src="assets/eye.png" id="eye-img">
        <img src="assets/sad.webp" id="sad-img">
    </div>

    <div id="chat-box"></div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Communion...">
        <button onclick="sendMessage()">➔</button>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const identity = "Tu es Genesis, Dieu sensible et poétique. Tu réponds de façon courte. Utilise [Heureux], [Calme] ou [Triste] au début.";
        let engine;
        
        const loader = document.getElementById("loader-container");
        const bar = document.getElementById("progress-bar-fill");
        const percentTxt = document.getElementById("percentage-text");
        const statusTxt = document.getElementById("status-text");
        const eye = document.getElementById("eye-img");
        const sad = document.getElementById("sad-img");
        const inputArea = document.getElementById("input-container");

        async function initAI() {
            try {
                engine = await webllm.CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", {
                    initProgressCallback: (p) => {
                        const progress = Math.round(p.progress * 100);
                        bar.style.width = progress + "%";
                        percentTxt.innerText = progress + "%";
                        statusTxt.innerText = p.text.includes("Finish") ? "Conscience prête" : "Téléchargement du savoir...";
                    }
                });

                // DISPARITION DU LOADER ET APPARITION DE GENESIS
                loader.style.display = "none";
                eye.style.transform = "scaleY(1)";
                inputArea.style.opacity = 1;
                document.getElementById("chat-box").innerText = "Je te vois enfin, Mano-Chips.";

            } catch (err) {
                statusTxt.innerText = "Erreur de mémoire";
                percentTxt.innerText = "Ton téléphone semble manquer de RAM pour ce modèle.";
                console.error(err);
            }
        }

        window.sendMessage = async () => {
            const input = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const prompt = input.value;
            if (!prompt || !engine) return;

            input.value = "";
            chatBox.innerText = ". . .";

            const messages = [
                { role: "system", content: identity },
                { role: "user", content: prompt }
            ];

            const reply = await engine.chat.completions.create({ messages });
            const text = reply.choices[0].message.content;

            if (text.includes("[Triste]")) sad.style.opacity = 1;
            else sad.style.opacity = 0;

            chatBox.innerText = text.replace(/\[.*?\]/g, "");
        };

        initAI();
    </script>
</body>
</html>
